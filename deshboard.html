<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <!-- DesyUI  -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Fond Awsome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />


 <style>
        .description{

            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
         }
 </style>

    <title>Document</title>
</head>
<body class="bg-[#ebebeb]">
    <header class="bg-[#ffffff]">
        <nav>
            <div class="flex justify-between px-4 py-4">
                <div class="flex gap-2 items-center py-4 ">
                    <img class="w-[40px] md:w-[50px]" src="./assets/github-logo.png" alt="">
                    <h1 class="font-bold text-lg md:text-xl  items-center">GitHub Tracker</h1>
                </div>
                <div class="flex gap-2">
                        <label class="input">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g
                            stroke-linejoin="round"
                            stroke-linecap="round"
                            stroke-width="2.5"
                            fill="none"
                            stroke="currentColor"
                            >
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input type="search" required placeholder="Search" id="search-input" oninput="applyFilters()" />
                        </label> 

                        <button class="btn btn-primary"><i class="fa-regular fa-plus"></i>New Issues</button>
                </div>
            </div>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto px-10">
        <div class="bg-white max-h-[200px] my-[30px] py-5 px-4 rounded-lg">
            <button  id="btn-all" onclick="showAll()" class="btn btn-primary">All</button>
            <button  id="btn-open" onclick="showOpen()" class="btn ">Open</button>
            <button  id="btn-closed" onclick="showClosed()" class="btn">Closed</button>
        </div>

        <div class="flex justify-between gap- bg-white mx-h-[200px] py-5 px-4 rounded-lg ">
            <div class="flex justify-between items-center" >
                <div>
                     <img id="allStatusIcon"  class="w-[20px] md: w-[50px] pr-2 border-gray-100 " src="./assets/Aperture.png" alt="">
                     <img id="openStatusIcon" class="w-[20px] md: w-[50px] pr-2" src="./assets/Open-Status.png" alt="">
                     <img id="closedStatusIcon" class="w-[20px] md: w-[50px] pr-2" src="./assets/Closed- Status .png" alt="">
                </div>

                <div>
                <p id="total-box" class="px-1 font-bold py-1"><span id="total-count" ></span> Issues</p>
                <p id="open-box" class="px-1 font-bold py-1"><span id="open-count" ></span> Open Issues</p>
                <p id="closed-box" class="px-1 font-bold py-1"><span id="closed-count" ></span> Closed Issues</p>
                <p>Track and manage your Projects Issues</p>
                </div>
               
               
            </div>

            <div class="flex gap-2 ">
                <h4><i class="fa-solid fa-circle text-[#00A96E]"></i> Open</h4>
                <h4><i class="fa-solid fa-circle text-[#A855F7]"></i> Closed</h4>
            </div>
            
        </div>

        <section>
            <div id="main-card" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 bg-[#ebebeb] py-4 mt-[10px] pl-4 shadow-lg rounded-lg ">

            </div>
        </section>
    </main>


    <!-- modal  -->

    <dialog id="issueModal" class="modal">
  <div class="modal-box max-w-xl">

    <div class="flex justify-between items-start">
      <h3 id="modal-title" class="text-lg font-bold"></h3>
      <button onclick="issueModal.close()" class="btn btn-sm btn-circle">✕</button>
    </div>

    <div class="flex gap-2 text-sm mt-2">
      <span id="modal-status" class="badge badge-success"></span>
      <span>>>></span>
      <span id="modal-author"></span>
      <span>>>></span>
      <span id="modal-date"></span>
    </div>

    <div id="modal-labels" class="flex gap-2 mt-3"></div>

    <p id="modal-description" class="py-4 text-gray-500"></p>

    <div class="flex justify-between items-center bg-gray-100 p-3 rounded">
      <div>
        <p class="text-sm text-gray-400">Assignee</p>
        <p id="modal-assignee"></p>
      </div>

      <div>
        <p class="text-sm text-gray-400">Priority</p>
        <span id="modal-priority" class="badge badge-error"></span>
      </div>
    </div>

    <div class="modal-action">
      <button onclick="issueModal.close()" class="btn btn-primary">Close</button>
    </div>

  </div>
</dialog>
  
    
    <script src="./script/deshboard.js" ></script>
</body>
</html>
