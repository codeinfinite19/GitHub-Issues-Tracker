<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <!-- DesyUI  -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Fond Awsome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />


    <title>Document</title>
</head>
<body class="bg-[#ebebeb]">
    <header class="bg-[#ffffff]">
        <nav>
            <div class="flex justify-between px-4 py-4">
                <div class="flex gap-2 items-center py-4 ">
                    <img class="w-[40px] md:w-[50px]" src="./assets/github-logo.png" alt="">
                    <h1 class="font-bold text-lg md:text-xl  items-center">GitHub Tracker</h1>
                </div>
                <div class="flex gap-2">
                        <label class="input">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g
                            stroke-linejoin="round"
                            stroke-linecap="round"
                            stroke-width="2.5"
                            fill="none"
                            stroke="currentColor"
                            >
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input type="search" required placeholder="Search" />
                        </label> 

                        <button class="btn btn-primary"><i class="fa-regular fa-plus"></i>New Issues</button>
                </div>
            </div>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto px-10">
        <div class="bg-white max-h-[200px] my-[30px] py-5 px-4 rounded-lg">
            <button onclick="loadPost()" class="btn btn-primary">All</button>
            <button onclick="showOpen()" class="btn ">Open</button>
            <button onclick="showClosed()" class="btn">Closed</button>
        </div>

        <div class="flex justify-between gap- bg-white mx-h-[200px] py-5 px-4 rounded-lg ">
            <div class="flex" >
                <div>
                     <img src="./assets/Aperture.png" alt="">
                </div>

                <div>
                <p><span id="total-count" ></span>Issues</p>
                <p><span id="open-count" ></span>OpenJobs</p>
                <p><span id="closed-count" ></span>ClosedJobs</p>
                <p>Track and manage your Projects Issues</p>
                </div>
               
               
            </div>

            <div class="flex gap-2 ">
                <h4><i class="fa-solid fa-circle text-[#00A96E]"></i> Open</h4>
                <h4><i class="fa-solid fa-circle text-[#A855F7]"></i> Closed</h4>
            </div>
            
        </div>

        <section>
            <div id="main-card" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 bg-[#ebebeb] py-4 mt-[10px] pl-4 shadow-lg rounded-lg ">

            </div>
        </section>
    </main>
  
    
    <script src="./script/deshboard.js" ></script>
</body>
</html>
