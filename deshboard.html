<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <!-- DesyUI  -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


    <title>Document</title>
</head>
<body class="bg-[#ebebeb]">
    <header class="bg-[#ffffff]">
        <nav>
            <div class="flex justify-between px-4 py-4">
                <div class="flex gap-1 justify-center align-middle">
                    <img class="w-[50px]" src="./assets/github-logo.png" alt="">
                    <h1 class="font-bold">GitHub Tracker</h1>
                </div>
                <div class="flex gap-2">
                        <label class="input">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g
                            stroke-linejoin="round"
                            stroke-linecap="round"
                            stroke-width="2.5"
                            fill="none"
                            stroke="currentColor"
                            >
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input type="search" required placeholder="Search" />
                        </label> 

                        <button class="btn btn-primary">Primary</button>
                </div>
            </div>
        </nav>
    </header>

    <main >
        <div>
            <button onclick="loadPost()" class="btn btn-primary">All</button>
            <button class="btn ">Open</button>
            <button class="btn">Closed</button>
        </div>

        <div class="flex justify-between gap-2">
            <div class="flex" >
                <div>
                     <img src="./assets/Aperture.png" alt="">
                </div>

                <div>
                 <h2>50 Issues</h2>
                <p>Track and manage your Projects Issues</p>
                </div>
               
               
            </div>

            <div class="flex gap-2">
                <h4>Open</h4>
                <h4>Closed</h4>
            </div>
            
        </div>

        <section>
            <div id="main-card" class="grid grid-cols-4 gap-2">

            </div>
        </section>
    </main>
  
    
    <script src="./script/deshboard.js" ></script>
</body>
</html>
